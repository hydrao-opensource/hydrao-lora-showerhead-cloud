services:
  # --- STACK CHIRPSTACK ---
  chirpstack:
    image: chirpstack/chirpstack:4
    command: -c /etc/chirpstack
    restart: unless-stopped
    networks:
      - iot_network
    depends_on:
      mosquitto:
        condition: service_started
      postgres:
        condition: service_healthy # Attend que le healthcheck de postgres soit OK
      redis:
        condition: service_healthy # Attend que le healthcheck de redis soit OK
    ports:
      - "8080:8080"
    volumes:
      - ./configuration/chirpstack:/etc/chirpstack
    environment:
      - POSTGRESQL_HOST=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}
      - REDIS_HOST=redis

  # UDP Packet Forwarder (not secure / for old gateways)
  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    networks:
      - iot_network
    ports:
      - "0.0.0.0:1700:1700/udp" # UDP
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    environment:
      - INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE=us915/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      - INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE=us915/gateway/{{ .GatewayID }}/state/{{ .StateType }}
      - INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE=us915/gateway/{{ .GatewayID }}/command/#
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}
    depends_on:
      - mosquitto

    # Basic station US915 (secure / for compatible gateways)
  chirpstack-gateway-bridge-basicstation:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    command: -c /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge-basicstation-us915.toml
    ports:
      - "3001:3001" # TCP US915
    networks:
      - iot_network
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}

  # Basic station EU868 (secure / for compatible gateways)
  chirpstack-gateway-bridge-basicstation-eu868:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    command: -c /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge-basicstation-eu868.toml
    ports:
      - "3002:3001" # TCP EU868
    networks:
      - iot_network
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}

  # UDP Packet Forwarder EU868 (not secure / for old gateways)
  chirpstack-gateway-bridge-eu868:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    networks:
      - iot_network
    ports:
      - "0.0.0.0:1701:1700/udp" # UDP EU868
    volumes:
      - ./configuration/chirpstack-gateway-bridge:/etc/chirpstack-gateway-bridge
    environment:
      - INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      - INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/state/{{ .StateType }}
      - INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE=eu868/gateway/{{ .GatewayID }}/command/#
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}
    depends_on:
      - mosquitto

  chirpstack-rest-api:
    image: chirpstack/chirpstack-rest-api:4
    restart: unless-stopped
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure
    networks:
      - iot_network
    ports:
      - "8090:8090"
    depends_on:
      - chirpstack

  postgres:
    image: postgres:14-alpine
    networks:
      - iot_network
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=chirpstack
      - POSTGRES_DB=chirpstack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chirpstack"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configuration/postgresql/initdb:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 300 1 --save 60 100 --appendonly no
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # --- STACK TRAITEMENT & STOCKAGE ---
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    networks:
      - iot_network
    ports:
      - "1883:1883"
    volumes:
      - ./configuration/mosquitto:/mosquitto/config

  node-app:
    image: node:18-alpine
    container_name: lora-provisioner
    entrypoint: ["sh", "-c", 'npm install && exec "$@"', "--"]
    command: ["node", "lora_provisioning.js"]
    volumes:
      - ./node-app:/usr/src/app
      - /usr/src/app/node_modules
      - ./gateways.csv:/csv/gateways.csv:ro
      - ./showerheads.csv:/csv/showerheads.csv:ro
      - ./grafana_users.csv:/csv/grafana_users.csv:ro
    working_dir: /usr/src/app
    networks:
      - iot_network
    environment:
      - CHIRPSTACK_URL=http://chirpstack-rest-api:8090
      - CHIRPSTACK_API_TOKEN=${CHIRPSTACK_API_TOKEN}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}
      - GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GRAFANA_URL=http://grafana:3000
    # Le conteneur ne tourne pas en boucle, il attend qu'on l'appelle
    profiles: ["tools"]

  nodered:
    build:
      context: ./configuration/node-red # Le dossier où se trouve le Dockerfile
    networks:
      - iot_network
    ports:
      - "1880:1880"
    depends_on:
      - mosquitto
      - influxdb
    environment:
      - TZ=Europe/Paris
      - CHIRPSTACK_URL=http://chirpstack-rest-api:8090
      - CHIRPSTACK_API_TOKEN=${CHIRPSTACK_API_TOKEN}
      - MQTT_BROKER_URL=${MQTT_BROKER_HOST}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - NODE_RED_CREDENTIAL_SECRET=${NODE_RED_CREDENTIAL_SECRET:-hydrao-lora-showerhead-cloud}
      - FLOWS=/usr/src/node-red/flows/flows.json # On force Node-RED à lire CE fichier
      - NODE_RED_SETTINGS_FILE=/usr/src/node-red/settings.js
    volumes:
      - ./configuration/node-red/flows:/usr/src/node-red/flows
      - ./volumes/node-red-data:/data
      - ./configuration/node-red/settings.js:/usr/src/node-red/settings.js:ro

  influxdb:
    image: influxdb:2.7
    networks:
      - iot_network
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_TOKEN} # Utilise le token ou un mot de passe dédié
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # --- STACK VISUALISATION ---
  grafana:
    image: grafana/grafana:latest
    networks:
      - iot_network
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - influxdb
    environment:
      # --- grafana conf
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      # --- POUR LA PROD
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/dashboard.json # Attention il devient READONLY
      - GF_EXPLORE_ENABLED=false # Désactive totalement le menu Explore
      - GF_PANELS_DISABLE_SANITIZE_HTML=true
      - GF_USERS_ALLOW_SIGN_UP=false # Empêche la création de compte sauvage
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_DASHBOARDS_EDITVIEWER_CAN_EDIT=true # Sécurité supplémentaire
      - GF_PANELS_DISABLE_PANEL_MENU=true
      - GF_HELP_ENABLED=false
      - GF_PROFILE_ENABLED=false
      - GF_NEWS_FEED_ENABLED=false
      - GF_USERS_VIEWERS_CAN_EDIT=false
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=1m
      - GF_USERS_DEFAULT_LANGUAGE=fr-FR
      # --- external conf
      - LANG=fr_FR.UTF-8
      - LC_ALL=fr_FR.UTF-8
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
      - POSTGRES_USER=chirpstack
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      # Montage des configurations de provisioning
      - ./configuration/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./configuration/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      # Montage du dossier contenant vos fichiers .json de dashboards
      - ./configuration/grafana/provisioning/dashboards_json:/var/lib/grafana/dashboards

networks:
  iot_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  node_red_data:
  influxdb_data:
  grafana_data:
